<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Agent Radar</title>
  <desc id="description">Trending LLM and AI Agent repositories, ranked by seven-day Star growth and delivered daily.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#111b3d"/>
      <stop offset="1" stop-color="#27104d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="36" fill="url(#background)"/>
  <circle cx="1090" cy="96" r="350" fill="url(#glow)"/>
  <circle cx="190" cy="590" r="300" fill="url(#glow)" opacity="0.55"/>

  <g opacity="0.18" stroke="#67e8f9" fill="none">
    <circle cx="1070" cy="180" r="84"/>
    <circle cx="1070" cy="180" r="126"/>
    <circle cx="1070" cy="180" r="168"/>
    <path d="M1070 12v336M902 180h336"/>
  </g>
  <circle cx="1070" cy="180" r="12" fill="#67e8f9"/>
  <path d="M1070 180l112-88" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>

  <g transform="translate(92 82)">
    <g filter="url(#shadow)">
      <rect width="116" height="116" rx="30" fill="#0f172a" stroke="#67e8f9" stroke-width="3"/>
      <path d="M26 78l22-25 18 15 26-34" fill="none" stroke="#67e8f9" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M78 34h14v14" fill="none" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="0" y="222" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-3">Agent Radar</text>
    <text x="0" y="282" fill="#a5f3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="650">TRENDING LLM &amp; AI AGENT REPOSITORIES</text>
    <text x="0" y="340" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27">Ranked by real 7-day Star growth. Delivered daily.</text>

    <g transform="translate(0 392)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
      <g><rect width="174" height="52" rx="26" fill="#172554" stroke="#60a5fa"/><text x="87" y="33" text-anchor="middle" fill="#dbeafe">GitHub Actions</text></g>
      <g transform="translate(190 0)"><rect width="142" height="52" rx="26" fill="#052e2b" stroke="#34d399"/><text x="71" y="33" text-anchor="middle" fill="#d1fae5">Zero cost</text></g>
      <g transform="translate(348 0)"><rect width="176" height="52" rx="26" fill="#2e1065" stroke="#a78bfa"/><text x="88" y="33" text-anchor="middle" fill="#ede9fe">Fork &amp; run</text></g>
    </g>

    <text x="0" y="518" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">Feishu · Slack · Telegram · WeCom · Discord · Webhook</text>
  </g>
</svg>
