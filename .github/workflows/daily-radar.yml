name: Agent Radar Daily

on:
  schedule:
    # GitHub cron uses UTC. 02:00 UTC = 10:00 Asia/Shanghai.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-agent-radar
  cancel-in-progress: false

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Restore star snapshots
        shell: bash
        run: |
          mkdir -p state output
          if git fetch origin data:refs/remotes/origin/data 2>/dev/null; then
            git show origin/data:stars.json > state/stars.json
          else
            printf '{"version":1,"snapshots":[]}\n' > state/stars.json
          fi

      - name: Collect and rank repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY_LIMIT: ${{ vars.REPOSITORY_LIMIT || '10' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '180' }}
        run: >-
          python scripts/collect_repos.py
          --state state/stars.json
          --output output/repos.json
          --limit "$REPOSITORY_LIMIT"
          --lookback-days "$LOOKBACK_DAYS"

      - name: Deliver to configured channels
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGNING_SECRET: ${{ secrets.FEISHU_SIGNING_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
        run: python scripts/notify.py output/repos.json

      - name: Publish report artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-radar-${{ github.run_number }}
          path: output/repos.json
          retention-days: 7

      - name: Save star snapshots to data branch
        if: always() && hashFiles('state/stars.json') != ''
        shell: bash
        run: |
          cp state/stars.json "$RUNNER_TEMP/stars.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git switch --force-create data origin/data
          else
            git switch --orphan data
            git rm -rf . || true
          fi
          cp "$RUNNER_TEMP/stars.json" stars.json
          git add stars.json
          if git diff --cached --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "chore: update daily star snapshots"
            git push origin data
          fi
