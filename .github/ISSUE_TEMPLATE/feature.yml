name: Feature proposal
description: Propose a ranking, workflow, documentation, or developer-experience improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: Who has this problem and what can they not do today?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed outcome
      description: Describe behavior rather than only implementation.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives and trade-offs
  - type: checkboxes
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this proposal.
